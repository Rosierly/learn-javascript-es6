<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Interview Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- Header -->
        <h1>Coding Interview</h1>
        <p class="subtitle">Master your interview one flash card at a time!</p>

        <!-- Progress bar -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Card counter -->
        <p class="counter">Card 0 of 8</p>

        <!-- Flashcard -->
        <div class="card" id="cardDisplay">
            Click Next to start!
        </div>

        <!-- Button -->
        <button id="nextBtn">Next →</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
